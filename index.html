<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madden JS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background: #000; color: white; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .overlay { position: absolute; pointer-events: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: rgba(0,0,8,0.85); }
        
        /* HUD Scoreboard */
        #scoreboard { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; background: #111; border-bottom: 4px solid #ffd700; padding: 10px 30px; gap: 40px; border-radius: 4px; pointer-events: none; }
        .team-info { text-align: center; }
        .score { font-size: 32px; color: #fff; }
        .game-status { font-size: 14px; color: #aaa; text-transform: uppercase; border-left: 1px solid #444; border-right: 1px solid #444; padding: 0 20px; }

        /* Play Calling */
        #play-calling { display: none; }
        .play-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .play-card { background: #222; border: 2px solid #444; padding: 20px; width: 180px; cursor: pointer; text-align: center; transition: 0.2s; }
        .play-card:hover { border-color: #ffd700; background: #333; transform: scale(1.05); }

        /* General HUD */
        #hud-bottom { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        .btn-hint { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; border: 1px solid #ffd700; font-size: 18px; }
        .hidden { display: none !important; }
        #big-message { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 80px; text-shadow: 4px 4px #000; color: #ffd700; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="scoreboard">
            <div class="team-info"><div>HOME</div><div id="home-score" class="score">0</div></div>
            <div class="team-status">
                <div id="game-clock">5:00</div>
                <div id="down-info" style="color:#ffd700">1ST & 10</div>
            </div>
            <div class="team-info"><div>AWAY</div><div id="away-score" class="score">0</div></div>
        </div>

        <div id="big-message"></div>

        <div id="menu-start" class="overlay">
            <h1>MADDEN JS FOUNDATION</h1>
            <button onclick="window.startGame()" style="padding:15px 50px; font-size:24px; cursor:pointer; background:#ffd700; border:none; font-weight:bold;">KICKOFF</button>
        </div>

        <div id="play-calling" class="overlay">
            <h2>SELECT PLAY</h2>
            <div class="play-grid" id="play-list"></div>
        </div>

        <div id="hud-bottom">
            <span id="snap-hint" class="btn-hint hidden">PRESS [SPACE] TO SNAP</span>
            <div id="pass-hints" class="hidden" style="display:flex; gap:10px; justify-content:center;">
                <span class="btn-hint">1: WR1</span>
                <span class="btn-hint">2: WR2</span>
                <span class="btn-hint">3: TE</span>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
